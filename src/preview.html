<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Preview Recording</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #111;
        color: #f0f0f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 20px;
      }

      .media-wrap {
        flex: 1;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      video, img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 6px;
        object-fit: contain;
      }

      .loading {
        color: #666;
        font-size: 0.9rem;
      }

      .actions {
        display: flex;
        gap: 12px;
        padding-bottom: 4px;
      }

      .btn {
        padding: 10px 32px;
        font-size: 0.95rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .btn-discard {
        background: #333;
        color: #ccc;
      }
      .btn-discard:hover { background: #444; }

      .btn-keep {
        background: #2f7d32;
        color: #fff;
      }
      .btn-keep:hover { background: #388e3c; }
    </style>
  </head>
  <body>
    <div class="media-wrap" id="media-wrap">
      <p class="loading">Loading preview…</p>
    </div>

    <div class="actions">
      <button class="btn btn-discard" id="btn-discard">Discard</button>
      <button class="btn btn-keep" id="btn-keep">Keep</button>
    </div>

    <script type="module" src="/preview.js"></script>
  </body>
</html>
