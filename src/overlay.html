<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Select Region</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        overflow: hidden;
        background: transparent;
        cursor: crosshair;
        user-select: none;
      }

      canvas {
        position: fixed;
        top: 0; left: 0;
        display: block;
      }

      .hint {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: rgba(0, 0, 0, 0.65);
        padding: 7px 16px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <p class="hint">Drag to select a region &nbsp;·&nbsp; Esc to cancel</p>
    <canvas id="canvas"></canvas>
    <script type="module" src="/overlay.js"></script>
  </body>
</html>
